name: Collect Beijing Institution Jobs

on:
  schedule:
    # GitHub Actions uses UTC: 00:30/10:30 = Beijing 08:30/18:30.
    - cron: "30 0 * * *"
    - cron: "30 10 * * *"
  workflow_dispatch:
    inputs:
      weekly:
        description: Recheck all saved notices
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: collect-bj-rsj
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install collector dependencies
        run: pip install -r requirements-collector.txt
      - name: Run parser tests
        run: python -m unittest tests/test_bj_rsj_collector.py
      - name: Collect notices
        shell: bash
        run: |
          WEEKLY=""
          if [[ "$(TZ=Asia/Shanghai date +%u)" == "7" && "$(TZ=Asia/Shanghai date +%H)" -lt "12" ]]; then WEEKLY="--weekly"; fi
          if [[ "${{ inputs.weekly }}" == "true" ]]; then WEEKLY="--weekly"; fi
          python scripts/collect_bj_rsj.py $WEEKLY
      - name: Save collected data
        run: |
          git config user.name "BJJob Collector"
          git config user.email "actions@users.noreply.github.com"
          git add data/collector-state/bj-rsj.json data/collected/bj-rsj.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update Beijing institution jobs [skip ci]"
          git push
