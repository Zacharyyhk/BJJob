name: Collect Other Recruitment Sources

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-other-sources
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-collector.txt
      - run: pip install -r requirements-collector.txt
      - run: python scripts/collect_other_sources.py
      - name: Save collected data
        run: |
          git config user.name "BJJob Collector"
          git config user.email "actions@users.noreply.github.com"
          git add data/collected/other-sources.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update other recruitment sources [skip ci]"
          git push
